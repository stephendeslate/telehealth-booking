app = "medconnect-api"
primary_region = "iad"

[build]

[deploy]
  release_command = "npx prisma migrate deploy --schema ../../prisma/schema.prisma"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
